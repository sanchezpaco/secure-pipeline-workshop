name: Deploy Application

on:
  workflow_call:
    outputs:
      deployment-result:
        description: "Application deployment result"
        value: ${{ jobs.deploy-app.outputs.result }}

jobs:
  deploy-app:
    name: Deploy Application
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }} 
    outputs:
      result: ${{ steps.deploy.outputs.result }}
    steps:
      - name: Deploy application
        id: deploy
        env:
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          echo "🚀 Deploying to ${REF_NAME} environment..."
          echo "📦 Image: workshop-app:${SHA}"
          echo "🌐 URL: https://workshop-app-${REF_NAME}.example.com"
          echo "result=deployed" >> "$GITHUB_OUTPUT"
          echo "✅ Deployment complete!"
