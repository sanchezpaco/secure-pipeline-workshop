name: Pipeline Security Scan

on:
  workflow_call:
    outputs:
      scan-result:
        description: "Pipeline scan result"
        value: ${{ jobs.zizmor.outputs.result }}

jobs:
  zizmor:
    name: Run zizmor 🌈
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read # only needed for private repos
      actions: read # only needed for private repos
    outputs:
      result: ${{ steps.set-result.outputs.result }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor 🌈
        id: zizmor
        uses: zizmorcore/zizmor-action@main
        with:
          min-severity: "high"
          # Disable online audits — they hard-crash the run on any GitHub API HTTP error
          # (see zizmor#1252 / #1874).
          online-audits: "false"

      - name: Set scan result
        id: set-result
        if: always()
        run: |
          if [ "${{ steps.zizmor.outcome }}" == "success" ]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
          fi
