name: Pipeline Security Scan

on:
  workflow_call:
    outputs:
      scan-result:
        description: "Pipeline scan result"
        value: ${{ jobs.zizmor.outputs.result }}

jobs:
  zizmor:
    name: Run zizmor 🌈
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read # only needed for private repos
      actions: read # only needed for private repos
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor 🌈
        id: zizmor
        uses: zizmorcore/zizmor-action@main
        with:
          min-severity: "high"
          # Disable online audits — they hard-crash the run on any GitHub API HTTP error
          # (see zizmor#1252 / #1874).
          online-audits: "false"

      - name: Fail on findings
        if: always()
        run: |
          test "$(jq '[.runs[].results[]] | length' "${{ steps.zizmor.outputs.output-file }}")" -eq 0
