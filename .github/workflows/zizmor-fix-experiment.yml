name: Zizmor fix experiment

# Verifies the proposed workshop fix: SARIF + post-step parser that exits 1 on
# any finding at or above min-severity. Expectation: RED on this branch
# because main contains template-injection findings in deploy-application.yml.

on:
  push:
    branches: [zizmor-fix]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  zizmor:
    name: Run zizmor 🌈
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor 🌈
        id: zizmor
        uses: zizmorcore/zizmor-action@main
        with:
          min-severity: "high"
          online-audits: "false"

      - name: Fail on findings
        if: always()
        run: |
          test "$(jq '[.runs[].results[]] | length' "${{ steps.zizmor.outputs.output-file }}")" -eq 0
