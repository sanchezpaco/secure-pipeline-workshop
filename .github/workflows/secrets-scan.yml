name: Secrets Scan

on:
  workflow_call:
    outputs:
      scan-result:
        description: "Secrets scan result"
        value: ${{ jobs.secrets-scan.outputs.result }}

jobs:
  secrets-scan:
    name: Secrets Scan with TruffleHog
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.scan-result.outputs.result }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run TruffleHog secrets scanner
        id: scan-tool
        run: |
          # Install TruffleHog
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin

          # Run filesystem scan.
          # `unverified` is included so the workshop's didactic AKIA in
          # code/src/simple-app.js (which AWS rejects as invalid) still
          # triggers a failure. Without it, trufflehog discards the match
          # as a false positive and the module silently passes.
          trufflehog filesystem . --results=verified,unknown,unverified --fail

      - name: Set scan result
        id: scan-result
        if: always()
        run: |
          if [ "${{ steps.scan-tool.outcome }}" == "success" ]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
            echo "✅ Secrets scan passed - no secrets detected"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "❌ Secrets scan failed - secrets detected in repository"
            exit 1
          fi
