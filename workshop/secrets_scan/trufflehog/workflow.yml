
# =============================================================================
# TRUFFLEHOG SECRETS SCAN JOB
# =============================================================================
#
# TruffleHog is a secrets scan tool for finding credentials in code
# Repository: https://github.com/trufflesecurity/trufflehog
#
# TO USE THIS JOB:
# 1. Copy this entire job definition into .github/workflows/secrets-scan.yml
# 2. Replace the current jobs: definition with this one
# 3. The job will automatically scan the entire repository for secrets
# 4. The scan will fail if any secrets are found
# =============================================================================

jobs:
  secrets-scan:
    name: Secrets Scan with TruffleHog
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.scan-result.outputs.result }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run TruffleHog secrets scanner
        id: scan-tool
        run: |
          # Install TruffleHog
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin

          # Use --json so the next step can produce a uniform "Summarize findings"
          # report (same shape as the other workshop modules).
          # Include `unverified` so detected-but-unverifiable secrets still fail the build
          # (the workshop's didactic AKIA is invalid and would otherwise be silently dropped).
          trufflehog filesystem . --results=verified,unknown,unverified --json > trufflehog.json

          if [ -s trufflehog.json ]; then
            exit 1
          fi

      - name: Summarize findings
        if: always() && hashFiles('trufflehog.json') != ''
        run: |
          REPORT=trufflehog.json
          if [ ! -s "$REPORT" ]; then
            echo "✅ No security alerts"
          else
            COUNT=$(jq -s 'length' "$REPORT")
            echo "❌ Found $COUNT TruffleHog finding(s):"
            jq -r '"  - \(.DetectorName) | verified=\(.Verified)\n      \(.SourceMetadata.Data.Filesystem.file):\(.SourceMetadata.Data.Filesystem.line // 1)"' "$REPORT"
          fi

      - name: Set scan result
        id: scan-result
        if: always()
        run: |
          if [ "${{ steps.scan-tool.outcome }}" == "success" ]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
            echo "✅ Secrets scan passed - no secrets detected"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "❌ Secrets scan failed - secrets detected in repository"
            exit 1
          fi
