# =============================================================================
# ZIZMOR PIPELINE SCAN JOB
# =============================================================================
#
# Zizmor is a security scanner for GitHub Actions workflows
# Repository: https://github.com/woodruffw/zizmor
#
# TO USE THIS JOB:
# 1. Copy this entire job definition into .github/workflows/pipeline-scan.yml
# 2. Replace the current jobs: definition with this one
# 3. The job will automatically scan all workflows in .github/workflows/
# 4. Results will be uploaded to GitHub Advanced Security (SARIF format)
# 5. Configure min-severity level as needed (low, medium, high, unknown)
# =============================================================================

jobs:
  zizmor:
    name: Run zizmor 🌈
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read # only needed for private repos
      actions: read # only needed for private repos
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor 🌈
        id: zizmor
        uses: zizmorcore/zizmor-action@main
        with:
          min-severity: "high"
          # Disable online audits — they hard-crash the run on any GitHub API HTTP error
          # (see zizmor#1252 / #1874).
          online-audits: "false"

      - name: Summarize findings
        if: always() && steps.zizmor.outputs.output-file != ''
        run: |
          SARIF="${{ steps.zizmor.outputs.output-file }}"
          COUNT=$(jq '[.runs[].results[]] | length' "$SARIF")
          if [ "${COUNT:-0}" -eq 0 ]; then
            echo "✅ No security alerts"
          else
            echo "❌ Found $COUNT zizmor finding(s):"
            jq -r '.runs[].results[] |
              "  - \(.ruleId) | \(.message.text)\n      \(.locations[0].physicalLocation.artifactLocation.uri):\(.locations[0].physicalLocation.region.startLine // 1)"' \
              "$SARIF"
            exit 1
          fi
